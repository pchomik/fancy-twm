name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-win10:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --no-default-features --features windows10
    - name: Run tests
      run: cargo test --no-default-features --features windows10

  build-win11:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --no-default-features --features windows11
    - name: Run tests
      run: cargo test --no-default-features --features windows11
